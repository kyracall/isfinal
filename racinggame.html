<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Racing Game</title>
<style>
  body {
    margin: 0;
    background: linear-gradient(#111, #333);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }
  canvas {
    display: block;
    margin: 20px auto;
    border: 4px solid #fff;
    border-radius: 10px;
    background: #2c2c2c;
  }
  h1 { margin-top: 10px; }
</style>
</head>
<body>

<h1>🏎️ Car Racing Game</h1>
<p>Use ← → arrows to move. Avoid cars and survive to win!</p>
<canvas id="gameCanvas" width="400" height="600"></canvas>
<p id="status"></p>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = { x: 180, y: 500, width: 40, height: 70 };
let obstacles = [];
let speed = 5;
let score = 0;
let gameOver = false;

function drawCar(x, y, color) {
  // Car body
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 40, 70);

  // Windshield
  ctx.fillStyle = "#aee";
  ctx.fillRect(x + 5, y + 10, 30, 15);

  // Wheels
  ctx.fillStyle = "black";
  ctx.fillRect(x - 3, y + 10, 6, 15);
  ctx.fillRect(x + 37, y + 10, 6, 15);
  ctx.fillRect(x - 3, y + 45, 6, 15);
  ctx.fillRect(x + 37, y + 45, 6, 15);

  // Headlights
  ctx.fillStyle = "yellow";
  ctx.fillRect(x + 5, y, 10, 5);
  ctx.fillRect(x + 25, y, 10, 5);
}

function drawRoad() {
  ctx.fillStyle = "#444";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // lane lines
  ctx.strokeStyle = "white";
  ctx.lineWidth = 4;
  ctx.setLineDash([20, 15]);

  ctx.beginPath();
  ctx.moveTo(133, 0);
  ctx.lineTo(133, 600);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(266, 0);
  ctx.lineTo(266, 600);
  ctx.stroke();

  ctx.setLineDash([]);
}

function spawnObstacle() {
  const lanes = [60, 180, 300];
  let lane = lanes[Math.floor(Math.random() * lanes.length)];
  obstacles.push({ x: lane, y: -80 });
}

function update() {
  if (gameOver) return;
  if (score % 500 === 0) {
    speed += 0.5;
  }

  drawRoad();

  // Draw player
  drawCar(player.x, player.y, "#00ff99");

  // Obstacles
  for (let i = 0; i < obstacles.length; i++) {
    let o = obstacles[i];
    o.y += speed;
    drawCar(o.x, o.y, "#ff4444");

    // Collision
    if (
      player.x < o.x + 40 &&
      player.x + player.width > o.x &&
      player.y < o.y + 70 &&
      player.y + player.height > o.y
    ) {
      gameOver = true;
      document.getElementById("status").innerText = "💥 Crash! Game Over";
    }
  }

  obstacles = obstacles.filter(o => o.y < 600);

  score++;

  if (score > 2000) {
    gameOver = true;
    document.getElementById("status").innerText = "🏁 You Win!";
  }

  ctx.fillStyle = "white";
  ctx.font = "18px Arial";
  ctx.fillText("Score: " + score, 10, 25);

  requestAnimationFrame(update);
}

window.addEventListener("keydown", function(e) {
  if (e.key === "ArrowLeft" && player.x > 20) player.x -= 120;
  if (e.key === "ArrowRight" && player.x < 260) player.x += 120;
});

setInterval(spawnObstacle, 1200);

update();
</script>

</body>
</html>
